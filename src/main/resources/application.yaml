spring:
  application:
    name: balfouriana
  servlet:
    multipart:
      max-file-size: 52MB
      max-request-size: 52MB
  datasource:
    url: ${BALFOURIANA_DB_URL:jdbc:h2:mem:balfouriana;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
    username: ${BALFOURIANA_DB_USERNAME:sa}
    password: ${BALFOURIANA_DB_PASSWORD:}
    driver-class-name: ${BALFOURIANA_DB_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
  main:
    banner-mode: off

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: INFO
  pattern:
    console: "ts=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level app=${spring.application.name} corr=%X{correlationId:-none} thread=%thread logger=%logger{36} msg=%msg%n"

balfouriana:
  runtime:
    service-identity: ${BALFOURIANA_SERVICE_IDENTITY:balfouriana-core}
  ingestion:
    root: ${BALFOURIANA_INGEST_ROOT:./data/ingest}
    receive-schema-version: ingestion.receive.v1
    rest:
      max-file-size-bytes: ${BALFOURIANA_INGEST_MAX_BYTES:52428800}
      api-key: ${BALFOURIANA_INGESTION_API_KEY:}
    drop-zone:
      enabled: ${BALFOURIANA_DROP_ZONE_ENABLED:true}
      poll-interval-ms: ${BALFOURIANA_DROP_ZONE_POLL_MS:5000}
      stability-check-ms: ${BALFOURIANA_DROP_ZONE_STABILITY_MS:2000}
